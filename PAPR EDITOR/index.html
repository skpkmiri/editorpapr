<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penyunting Eviden PAPR</title>
    
    <!-- Tailwind CSS untuk Sistem Gaya -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel untuk membaca kod React (JSX) secara terus di dalam pelayar -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        canvas { touch-action: none; }
    </style>
</head>
<body>
    <!-- Tempat Aplikasi React Akan Dimuatkan -->
    <div id="root"></div>

    <!-- Skrip Utama Aplikasi -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { Camera, Image as ImageIcon, Video, Type, Upload, Circle, Move, Download, Save, Play, Pause, Square, Info, Trash2, ArrowUpRight, Clock, HardDrive, SlidersHorizontal, Grid, RefreshCw, Edit } from 'https://esm.sh/lucide-react@0.292.0';

        const gradients = [
            { name: 'Biru Profesional', value: ['#1e3c72', '#2a5298'] },
            { name: 'Biru Lembut', value: ['#2193b0', '#6dd5ed'] },
            { name: 'Zamrud', value: ['#11998e', '#38ef7d'] },
            { name: 'Senja', value: ['#ff7e5f', '#feb47b'] },
            { name: 'Kelabu Gelap', value: ['#434343', '#000000'] }
        ];

        function App() {
            // State Aplikasi
            const [bgGradient, setBgGradient] = useState(gradients[0].value);
            
            // State Media Utama
            const [mediaType, setMediaType] = useState(null); 
            const [isPlaying, setIsPlaying] = useState(false);
            const mediaElementsRef = useRef([]); 
            const [mediaProps, setMediaProps] = useState({ x: 480, y: 360, scale: 1 }); 

            // State Bulatan Fokus Berbilang (Max 5)
            const [circles, setCircles] = useState([]);

            // State Inset (Gambar Kecil) - Tambah prop scale, panX, panY untuk kawalan imej dalam
            const [showInset, setShowInset] = useState(false);
            const insetRef = useRef(null);
            const [insetProps, setInsetProps] = useState({ x: 800, y: 150, radius: 80, scale: 1, panX: 0, panY: 0 });

            // State Anak Panah
            const [showArrow, setShowArrow] = useState(false);
            const [arrowProps, setArrowProps] = useState({ x: 480, y: 360, length: 180, angle: -45 });

            // State Interaksi & Rakaman
            const [activeLayer, setActiveLayer] = useState('media'); 
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
            const [isRecording, setIsRecording] = useState(false);
            
            // State Video & Rakaman
            const [videoDuration, setVideoDuration] = useState(0);
            const [videoCurrentTime, setVideoCurrentTime] = useState(0);
            const [recordingTime, setRecordingTime] = useState(0);
            const [recordingSize, setRecordingSize] = useState(0);

            // State Rekod Sistem
            const [records, setRecords] = useState([]);

            const canvasRef = useRef(null);
            const mediaRecorderRef = useRef(null);
            const recordedChunksRef = useRef([]);
            const recordingTimerRef = useRef(null);

            // Rujukan State untuk Gelung Animasi
            const stateRef = useRef({
                bgGradient, mediaProps, circles, showInset, insetProps, showArrow, arrowProps, mediaType
            });

            useEffect(() => {
                stateRef.current = { bgGradient, mediaProps, circles, showInset, insetProps, showArrow, arrowProps, mediaType };
            }, [bgGradient, mediaProps, circles, showInset, insetProps, showArrow, arrowProps, mediaType]);

            // Muat Rekod dari Local Storage semasa dimulakan
            useEffect(() => {
                const savedRecords = localStorage.getItem('papr_records');
                if (savedRecords) {
                    setRecords(JSON.parse(savedRecords));
                }
            }, []);

            // Enjin Render Kanvas (Gelung Animasi)
            useEffect(() => {
                let animationFrameId;

                const drawCover = (ctx, img, x, y, w, h) => {
                    const imgRatio = img.width / img.height;
                    const boxRatio = w / h;
                    let renderW, renderH, offsetX = 0, offsetY = 0;

                    if (imgRatio > boxRatio) {
                        renderH = h;
                        renderW = img.width * (h / img.height);
                        offsetX = (w - renderW) / 2;
                    } else {
                        renderW = w;
                        renderH = img.height * (w / img.width);
                        offsetY = (h - renderH) / 2;
                    }

                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(x, y, w, h);
                    ctx.clip();
                    ctx.drawImage(img, x + offsetX, y + offsetY, renderW, renderH);
                    ctx.restore();
                };

                const render = () => {
                    const canvas = canvasRef.current;
                    if (!canvas) return;
                    const ctx = canvas.getContext('2d');
                    const state = stateRef.current;

                    // 1. Lukis Latar Belakang (Gradient) - 960x720 (720p 4:3)
                    const grd = ctx.createLinearGradient(0, 0, 960, 720);
                    state.bgGradient.forEach((color, index) => {
                        grd.addColorStop(index / (state.bgGradient.length - 1), color);
                    });
                    ctx.fillStyle = grd;
                    ctx.fillRect(0, 0, 960, 720);

                    // 2. Lukis Media Utama (Termasuk Kolaj)
                    const mediaArr = mediaElementsRef.current;
                    if (mediaArr && mediaArr.length > 0) {
                        ctx.save();
                        ctx.translate(state.mediaProps.x, state.mediaProps.y);
                        ctx.scale(state.mediaProps.scale, state.mediaProps.scale);

                        if (state.mediaType === 'collage') {
                            const W = 960;
                            const H = 720;
                            const gap = 10; 

                            if (mediaArr.length === 2) {
                                drawCover(ctx, mediaArr[0], -W/2, -H/2, W/2 - gap/2, H);
                                drawCover(ctx, mediaArr[1], gap/2, -H/2, W/2 - gap/2, H);
                            } else if (mediaArr.length === 3) {
                                drawCover(ctx, mediaArr[0], -W/2, -H/2, W/2 - gap/2, H/2 - gap/2);
                                drawCover(ctx, mediaArr[1], gap/2, -H/2, W/2 - gap/2, H/2 - gap/2);
                                drawCover(ctx, mediaArr[2], -W/2, gap/2, W, H/2 - gap/2);
                            } else if (mediaArr.length >= 4) {
                                drawCover(ctx, mediaArr[0], -W/2, -H/2, W/2 - gap/2, H/2 - gap/2);
                                drawCover(ctx, mediaArr[1], gap/2, -H/2, W/2 - gap/2, H/2 - gap/2);
                                drawCover(ctx, mediaArr[2], -W/2, gap/2, W/2 - gap/2, H/2 - gap/2);
                                drawCover(ctx, mediaArr[3], gap/2, gap/2, W/2 - gap/2, H/2 - gap/2);
                            }
                        } else {
                            const m = mediaArr[0];
                            const dims = m.videoWidth ? { w: m.videoWidth, h: m.videoHeight } : { w: m.width, h: m.height };
                            if (dims.w > 0) {
                                ctx.drawImage(m, -dims.w / 2, -dims.h / 2, dims.w, dims.h);
                            }
                        }
                        ctx.restore();
                    }

                    // 3. Lukis Bulatan Fokus (Berbilang)
                    state.circles.forEach(circle => {
                        ctx.save();
                        ctx.beginPath();
                        ctx.arc(circle.x, circle.y, circle.radius, 0, 2 * Math.PI);
                        ctx.strokeStyle = '#ef4444'; 
                        ctx.lineWidth = 6;
                        ctx.shadowColor = 'rgba(0,0,0,0.8)';
                        ctx.shadowBlur = 8;
                        ctx.stroke();
                        
                        // Tambah label nombor kecil jika bulatan lebih dari 1
                        if (state.circles.length > 1) {
                            ctx.fillStyle = '#ef4444';
                            ctx.font = 'bold 20px Arial';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            const index = state.circles.indexOf(circle) + 1;
                            ctx.fillText(index, circle.x, circle.y - circle.radius - 15);
                        }
                        ctx.restore();
                    });

                    // 4. Lukis Inset (Gambar Kecil / Layer)
                    if (state.showInset && insetRef.current) {
                        const m = insetRef.current;
                        const dims = { w: m.width, h: m.height };
                        if (dims.w > 0) {
                            ctx.save();
                            ctx.beginPath();
                            ctx.arc(state.insetProps.x, state.insetProps.y, state.insetProps.radius, 0, 2 * Math.PI);
                            ctx.closePath();
                            
                            ctx.lineWidth = 6;
                            ctx.strokeStyle = '#ffffff';
                            ctx.shadowColor = 'rgba(0,0,0,0.6)';
                            ctx.shadowBlur = 10;
                            ctx.stroke();
                            ctx.clip();

                            // Asas Skala untuk meliputi seluruh bulatan
                            const baseScale = Math.max((state.insetProps.radius * 2) / dims.w, (state.insetProps.radius * 2) / dims.h);
                            // Didarabkan dengan zoom (scale) pengguna
                            const userScale = state.insetProps.scale || 1;
                            const finalScale = baseScale * userScale;
                            
                            const w = dims.w * finalScale;
                            const h = dims.h * finalScale;
                            
                            // Dapatkan nilai panX dan panY
                            const panX = state.insetProps.panX || 0;
                            const panY = state.insetProps.panY || 0;
                            
                            // Lukis imej dengan mengambil kira koordinat pan (gerakan)
                            ctx.drawImage(m, state.insetProps.x - w / 2 + panX, state.insetProps.y - h / 2 + panY, w, h);
                            ctx.restore();
                        }
                    }

                    // 5. Lukis Anak Panah
                    if (state.showArrow) {
                        ctx.save();
                        ctx.translate(state.arrowProps.x, state.arrowProps.y);
                        ctx.rotate((state.arrowProps.angle * Math.PI) / 180);

                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(state.arrowProps.length, 0);
                        ctx.strokeStyle = '#ef4444'; 
                        ctx.lineWidth = 8;
                        ctx.lineCap = 'round';
                        ctx.shadowColor = 'rgba(0,0,0,0.6)';
                        ctx.shadowBlur = 6;
                        ctx.stroke();

                        ctx.beginPath();
                        ctx.moveTo(state.arrowProps.length + 2, 0);
                        ctx.lineTo(state.arrowProps.length - 20, -12);
                        ctx.lineTo(state.arrowProps.length - 20, 12);
                        ctx.fillStyle = '#ef4444';
                        ctx.fill();

                        ctx.restore();
                    }

                    animationFrameId = window.requestAnimationFrame(render);
                };

                render();

                return () => window.cancelAnimationFrame(animationFrameId);
            }, []);

            // --- PENGENDALI REKOD (AUTO SIMPAN) ---
            const autoSaveRecord = () => {
                if (!canvasRef.current) return;
                
                // Cipta thumbnail kecil (240x180) untuk elak storage browser penuh
                const thumbCanvas = document.createElement('canvas');
                thumbCanvas.width = 240;
                thumbCanvas.height = 180;
                const tCtx = thumbCanvas.getContext('2d');
                tCtx.drawImage(canvasRef.current, 0, 0, 240, 180);
                const thumbnailDataUrl = thumbCanvas.toDataURL('image/jpeg', 0.5); // Kualiti 50%

                const generatedTitle = `Eviden - ${new Date().toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit' })}`;

                const newRecord = {
                    id: Date.now().toString(),
                    date: new Date().toLocaleString('ms-MY'),
                    title: generatedTitle,
                    bgGradient,
                    mediaProps,
                    circles,
                    showInset,
                    insetProps,
                    showArrow,
                    arrowProps,
                    thumbnail: thumbnailDataUrl
                };

                const updatedRecords = [newRecord, ...records].slice(0, 50); // Hadkan 50 rekod
                setRecords(updatedRecords);
                localStorage.setItem('papr_records', JSON.stringify(updatedRecords));
            };

            const loadRecord = (rec) => {
                if (mediaElementsRef.current[0] && mediaType === 'video') {
                    mediaElementsRef.current[0].pause();
                    setIsPlaying(false);
                }
                setBgGradient(rec.bgGradient);
                setMediaProps(rec.mediaProps || { x: 480, y: 360, scale: 1 });
                setCircles(rec.circles || []);
                setShowInset(rec.showInset || false);
                setInsetProps(rec.insetProps || { x: 800, y: 150, radius: 80, scale: 1, panX: 0, panY: 0 });
                setShowArrow(rec.showArrow || false);
                setArrowProps(rec.arrowProps || { x: 480, y: 360, length: 180, angle: -45 });
                
                // Reset media sebab file upload tak boleh disimpan di local storage
                setMediaType(null);
                mediaElementsRef.current = [];
                insetRef.current = null;
                setActiveLayer('media');
                
                alert("Rekod berjaya dimuatkan! Sila muat naik semula gambar/video asal anda ke dalam kawasan yang disediakan.");
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const deleteRecord = (id) => {
                if(window.confirm("Adakah anda pasti untuk memadam rekod ini?")) {
                    const updated = records.filter(r => r.id !== id);
                    setRecords(updated);
                    localStorage.setItem('papr_records', JSON.stringify(updated));
                }
            };

            // --- PENGENDALI ISI SEMULA (RESET) ---
            const handleReset = () => {
                if(window.confirm("Adakah anda pasti mahu set semula (reset) kanvas? Semua media yang tidak disimpan akan hilang.")) {
                    if (mediaElementsRef.current[0] && mediaType === 'video') {
                        mediaElementsRef.current[0].pause();
                    }
                    setBgGradient(gradients[0].value);
                    setMediaType(null);
                    mediaElementsRef.current = [];
                    setMediaProps({ x: 480, y: 360, scale: 1 });
                    setCircles([]);
                    setShowInset(false);
                    insetRef.current = null;
                    setInsetProps({ x: 800, y: 150, radius: 80, scale: 1, panX: 0, panY: 0 });
                    setShowArrow(false);
                    setActiveLayer('media');
                    setIsPlaying(false);
                }
            };

            // --- PENGENDALI BULATAN BERBILANG ---
            const handleAddCircle = () => {
                if (circles.length >= 5) {
                    alert("Maksimum 5 bulatan sahaja dibenarkan.");
                    return;
                }
                const newId = Date.now().toString();
                const newCircle = { id: newId, x: 480, y: 360, radius: 100 };
                setCircles([...circles, newCircle]);
                setActiveLayer(`circle-${newId}`);
            };

            const handleRemoveCircle = (id) => {
                setCircles(circles.filter(c => c.id !== id));
                if (activeLayer === `circle-${id}`) setActiveLayer('media');
            };

            // --- PENGENDALI MEDIA ---
            const handleMainMediaUpload = (e) => {
                const files = Array.from(e.target.files).slice(0, 4); 
                if (files.length === 0) return;
                
                const hasVideo = files.some(f => f.type.startsWith('video/'));

                if (hasVideo) {
                    const videoFile = files.find(f => f.type.startsWith('video/'));
                    const url = URL.createObjectURL(videoFile);
                    
                    const video = document.createElement('video');
                    video.src = url;
                    video.loop = false; 
                    video.muted = true;
                    
                    video.onloadedmetadata = () => setVideoDuration(video.duration);
                    video.ontimeupdate = () => setVideoCurrentTime(video.currentTime);

                    video.onended = () => {
                        setIsPlaying(false);
                        if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
                            mediaRecorderRef.current.stop();
                        }
                    };

                    video.onloadeddata = () => {
                        mediaElementsRef.current = [video];
                        setMediaType('video');
                        setIsPlaying(false);
                        const scale = Math.min(960 / video.videoWidth, 720 / video.videoHeight);
                        setMediaProps({ x: 480, y: 360, scale: scale });
                        setActiveLayer('media');
                    };
                } else {
                    Promise.all(files.map(file => {
                        return new Promise((resolve) => {
                            const url = URL.createObjectURL(file);
                            const img = new Image();
                            img.src = url;
                            img.onload = () => resolve(img);
                        });
                    })).then(images => {
                        mediaElementsRef.current = images;
                        setMediaType(images.length > 1 ? 'collage' : 'image');
                        
                        if (images.length === 1) {
                            const scale = Math.min(960 / images[0].width, 720 / images[0].height);
                            setMediaProps({ x: 480, y: 360, scale: scale });
                        } else {
                            setMediaProps({ x: 480, y: 360, scale: 1 });
                        }
                        
                        setActiveLayer('media');
                    });
                }
            };

            const handleInsetUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.src = url;
                img.onload = () => {
                    insetRef.current = img;
                    setShowInset(true);
                    setActiveLayer('inset');
                };
            };

            const togglePlay = () => {
                if (mediaElementsRef.current[0] && mediaType === 'video') {
                    const vid = mediaElementsRef.current[0];
                    if (isPlaying) {
                        vid.pause();
                    } else {
                        if (vid.currentTime >= vid.duration) {
                            vid.currentTime = 0;
                        }
                        vid.play();
                    }
                    setIsPlaying(!isPlaying);
                }
            };

            // --- PENGENDALI INTERAKSI (DRAG) ---
            const handlePointerDown = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const scaleX = 960 / rect.width;
                const scaleY = 720 / rect.height;
                
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;

                setIsDragging(true);
                setDragStart({ x, y });
            };

            const handlePointerMove = (e) => {
                if (!isDragging) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const scaleX = 960 / rect.width;
                const scaleY = 720 / rect.height;
                
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;

                const dx = x - dragStart.x;
                const dy = y - dragStart.y;

                if (activeLayer === 'media') {
                    setMediaProps(prev => ({ ...prev, x: prev.x + dx, y: prev.y + dy }));
                } else if (activeLayer.startsWith('circle-')) {
                    const circleId = activeLayer.replace('circle-', '');
                    setCircles(prev => prev.map(c => c.id === circleId ? { ...c, x: c.x + dx, y: c.y + dy } : c));
                } else if (activeLayer === 'inset') {
                    setInsetProps(prev => ({ ...prev, x: prev.x + dx, y: prev.y + dy }));
                } else if (activeLayer === 'arrow') {
                    setArrowProps(prev => ({ ...prev, x: prev.x + dx, y: prev.y + dy }));
                }

                setDragStart({ x, y });
            };

            const handlePointerUp = () => setIsDragging(false);

            const handleDeleteLayer = () => {
                setShowInset(false);
                insetRef.current = null;
                if (activeLayer === 'inset') setActiveLayer('media');
            };

            // --- EKSPORT & SIMPAN ---
            const downloadJPEG = () => {
                if (!canvasRef.current) return;
                autoSaveRecord(); // AUTO SIMPAN REKOD
                const url = canvasRef.current.toDataURL('image/jpeg', 0.9);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Eviden_PAPR_${Date.now()}.jpg`;
                a.click();
            };

            const startRecording = () => {
                if (!canvasRef.current) return;
                
                const stream = canvasRef.current.captureStream(30);
                
                if (mediaType === 'video' && mediaElementsRef.current[0]) {
                    const vid = mediaElementsRef.current[0];
                    try {
                        const vidStream = vid.captureStream ? vid.captureStream() : (vid.mozCaptureStream ? vid.mozCaptureStream() : null);
                        if (vidStream && vidStream.getAudioTracks().length > 0) {
                            stream.addTrack(vidStream.getAudioTracks()[0]);
                        }
                    } catch (err) {
                        console.warn("Audio capture not supported/failed:", err);
                    }
                }

                recordedChunksRef.current = [];
                setRecordingTime(0);
                setRecordingSize(0);

                let mimeType = 'video/webm; codecs=vp9';
                let ext = 'webm';
                
                if (typeof MediaRecorder.isTypeSupported === 'function') {
                    if (MediaRecorder.isTypeSupported('video/mp4; codecs="avc1.42E01E, mp4a.40.2"')) {
                        mimeType = 'video/mp4; codecs="avc1.42E01E, mp4a.40.2"';
                        ext = 'mp4';
                    } else if (MediaRecorder.isTypeSupported('video/mp4')) {
                        mimeType = 'video/mp4';
                        ext = 'mp4';
                    }
                }

                const options = { mimeType: mimeType, videoBitsPerSecond: 400000 }; 
                
                try {
                    const recorder = new MediaRecorder(stream, options);
                    recorder.ondataavailable = (e) => {
                        if (e.data.size > 0) {
                            recordedChunksRef.current.push(e.data);
                            
                            const currentTotalSize = recordedChunksRef.current.reduce((acc, chunk) => acc + chunk.size, 0);
                            setRecordingSize(currentTotalSize);
                            
                            if (currentTotalSize >= 1048576) {
                                if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
                                    mediaRecorderRef.current.stop();
                                    alert("Saiz rakaman 720p telah mencecah had maksimum 1MB. Rakaman dihentikan automatik.");
                                }
                            }
                        }
                    };
                    recorder.onstop = () => {
                        clearInterval(recordingTimerRef.current);
                        
                        autoSaveRecord(); // AUTO SIMPAN REKOD

                        const blob = new Blob(recordedChunksRef.current, { type: mimeType });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `Eviden_PAPR_Video_720p_${Date.now()}.${ext}`; 
                        a.click();
                        setIsRecording(false);
                        setIsPlaying(false);
                    };
                    
                    recorder.start(1000);
                    mediaRecorderRef.current = recorder;
                    setIsRecording(true);

                    recordingTimerRef.current = setInterval(() => {
                        setRecordingTime(prev => {
                            if (prev >= 59) {
                                if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
                                    mediaRecorderRef.current.stop();
                                    alert("Had masa 60 saat telah dicapai. Rakaman dihentikan automatik.");
                                }
                                return 60;
                            }
                            return prev + 1;
                        });
                    }, 1000);
                    
                    if (mediaType === 'video' && !isPlaying) {
                        if (mediaElementsRef.current[0].currentTime >= mediaElementsRef.current[0].duration) {
                             mediaElementsRef.current[0].currentTime = 0;
                        }
                        mediaElementsRef.current[0].play();
                        setIsPlaying(true);
                    }
                } catch (e) {
                    alert("Ralat memulakan rakaman video pada pelayar anda. Cuba pada Google Chrome versi terkini.");
                    console.error(e);
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
                    mediaRecorderRef.current.stop();
                    if (mediaType === 'video' && mediaElementsRef.current[0]) {
                        mediaElementsRef.current[0].pause();
                        setIsPlaying(false);
                    }
                }
            };

            const handleVideoSeek = (e) => {
                const time = parseFloat(e.target.value);
                if (mediaElementsRef.current[0] && mediaType === 'video') {
                    mediaElementsRef.current[0].currentTime = time;
                    setVideoCurrentTime(time);
                }
            };

            // --- RENDER UI ---
            return (
                <div className="min-h-screen p-4 md:p-6 font-sans">
                    <header className="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                                <Camera className="text-blue-600" />
                                Penyunting Eviden PAPR
                            </h1>
                            <p className="text-gray-500 text-sm mt-1">Hasilkan eviden bergambar, kolaj, rakaman video, dan auto simpan rekod</p>
                        </div>
                        <button 
                            onClick={handleReset}
                            className="flex items-center justify-center gap-2 bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg font-medium text-sm transition shadow-sm"
                        >
                            <RefreshCw size={16}/> Isi Semula (Reset)
                        </button>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        
                        {/* PANEL KAWALAN (Kiri) */}
                        <div className="lg:col-span-4 bg-white p-5 rounded-xl shadow-sm border border-gray-100 space-y-6">
                            
                            {/* Seksyen 1: Latar Belakang */}
                            <div>
                                <h2 className="text-sm font-semibold text-gray-700 uppercase tracking-wider mb-3">1. Latar Belakang</h2>
                                <div className="flex gap-2 flex-wrap">
                                    {gradients.map((g, i) => (
                                        <button
                                            key={i}
                                            onClick={() => setBgGradient(g.value)}
                                            title={g.name}
                                            className={`w-8 h-8 rounded-full border-2 ${bgGradient === g.value ? 'border-blue-500 scale-110 shadow-md' : 'border-transparent'}`}
                                            style={{ background: `linear-gradient(to bottom right, ${g.value[0]}, ${g.value[1]})` }}
                                        />
                                    ))}
                                </div>
                            </div>

                            {/* Seksyen 2: Media Utama */}
                            <div>
                                <h2 className="text-sm font-semibold text-gray-700 uppercase tracking-wider mb-3 flex items-center gap-2">
                                    <Upload size={16}/> 2. Media Utama (Sokong Kolaj)
                                </h2>
                                <label className="cursor-pointer border-2 border-dashed border-gray-300 rounded-lg p-4 flex flex-col items-center justify-center bg-gray-50 hover:bg-gray-100 transition relative">
                                    {mediaType === 'collage' ? <Grid size={24} className="text-blue-500 mb-2"/> : <Video size={24} className="text-gray-400 mb-2"/>}
                                    <span className="text-sm text-gray-600 font-medium">Pilih Gambar / Video</span>
                                    <span className="text-[11px] text-gray-400 mt-1 text-center">Boleh pilih (highlight) sehingga <strong>4 gambar serentak</strong> untuk mod Kolaj, atau 1 video MP4.</span>
                                    <input type="file" accept="image/*, video/*" multiple className="hidden" onChange={handleMainMediaUpload} />
                                </label>

                                {mediaType === 'video' && (
                                    <div className="mt-4 bg-gray-50 p-3 rounded-lg border border-gray-200">
                                        <label className="flex justify-between text-xs text-gray-600 mb-2 font-medium">
                                            <span className="flex items-center gap-1"><SlidersHorizontal size={14}/> Garis Masa Video</span>
                                            <span>{videoCurrentTime.toFixed(1)}s / {videoDuration.toFixed(1)}s</span>
                                        </label>
                                        <input 
                                            type="range" 
                                            min="0" 
                                            max={videoDuration || 100} 
                                            step="0.1" 
                                            value={videoCurrentTime}
                                            onChange={handleVideoSeek}
                                            className="w-full accent-blue-600"
                                        />
                                    </div>
                                )}
                            </div>

                            {/* Seksyen 3: Alatan Fokus */}
                            <div>
                                <h2 className="text-sm font-semibold text-gray-700 uppercase tracking-wider mb-3 flex items-center gap-2">
                                    <Circle size={16}/> 3. Alatan Fokus
                                </h2>
                                
                                <div className="flex flex-col gap-2 mb-4 bg-blue-50 p-3 rounded-lg">
                                    <div className="flex items-center justify-between mb-1">
                                        <span className="text-sm font-medium text-blue-900">Bulatan Subjek ({circles.length}/5)</span>
                                        <button 
                                            onClick={handleAddCircle}
                                            disabled={circles.length >= 5}
                                            className="bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white text-xs px-3 py-1 rounded shadow-sm transition"
                                        >
                                            + Tambah Bulatan
                                        </button>
                                    </div>
                                    {circles.length > 0 && (
                                        <p className="text-[10px] text-blue-700">Pilih "Bulat X" di ruangan Kawalan untuk mengubah saiz.</p>
                                    )}
                                </div>

                                <div className="bg-purple-50 p-3 rounded-lg mb-4">
                                    <div className="flex items-center justify-between mb-2">
                                        <span className="text-sm font-medium text-purple-900">Layer Gambar Kecil</span>
                                        <button 
                                            onClick={() => { setShowInset(!showInset); if(!showInset) setActiveLayer('inset'); }}
                                            className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${showInset ? 'bg-purple-600' : 'bg-gray-300'}`}
                                        >
                                            <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${showInset ? 'translate-x-6' : 'translate-x-1'}`} />
                                        </button>
                                    </div>
                                    {showInset && (
                                        <div className="flex gap-2">
                                            <label className="flex-1 cursor-pointer flex items-center justify-center gap-2 bg-white border border-purple-200 rounded p-2 hover:bg-purple-100 transition text-sm text-purple-700">
                                                <ImageIcon size={16}/> Muat Naik Muka Murid
                                                <input type="file" accept="image/*" className="hidden" onChange={handleInsetUpload} />
                                            </label>
                                            {insetRef.current && (
                                                <button onClick={handleDeleteLayer} className="px-3 bg-red-100 text-red-600 hover:bg-red-200 border border-red-200 rounded transition" title="Padam Layer">
                                                    <Trash2 size={16} />
                                                </button>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <div className="bg-orange-50 p-3 rounded-lg">
                                    <div className="flex items-center justify-between">
                                        <span className="text-sm font-medium text-orange-900 flex items-center gap-2"><ArrowUpRight size={16}/> Anak Panah</span>
                                        <button 
                                            onClick={() => { setShowArrow(!showArrow); if(!showArrow) setActiveLayer('arrow'); }}
                                            className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${showArrow ? 'bg-orange-600' : 'bg-gray-300'}`}
                                        >
                                            <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${showArrow ? 'translate-x-6' : 'translate-x-1'}`} />
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Seksyen 4: Kawalan Kedudukan & Saiz */}
                            <div>
                                <h2 className="text-sm font-semibold text-gray-700 uppercase tracking-wider mb-3 flex items-center gap-2">
                                    <Move size={16}/> 4. Kawalan (Pilih untuk ditarik)
                                </h2>
                                <div className="flex flex-wrap bg-gray-100 p-1 rounded-lg mb-4 gap-1">
                                    <button 
                                        onClick={() => setActiveLayer('media')}
                                        className={`flex-1 min-w-[60px] text-xs py-2 rounded-md font-medium transition ${activeLayer === 'media' ? 'bg-white shadow text-gray-800' : 'text-gray-500'}`}
                                    >Media</button>
                                    
                                    {/* Generate butang bulatan secara dinamik */}
                                    {circles.map((circle, index) => (
                                        <button 
                                            key={circle.id}
                                            onClick={() => setActiveLayer(`circle-${circle.id}`)}
                                            className={`flex-1 min-w-[60px] text-xs py-2 rounded-md font-medium transition ${activeLayer === `circle-${circle.id}` ? 'bg-white shadow text-blue-700' : 'text-gray-500'}`}
                                        >
                                            Bulat {index + 1}
                                        </button>
                                    ))}

                                    <button 
                                        onClick={() => setActiveLayer('inset')}
                                        disabled={!showInset}
                                        className={`flex-1 min-w-[60px] text-xs py-2 rounded-md font-medium transition disabled:opacity-50 ${activeLayer === 'inset' ? 'bg-white shadow text-gray-800' : 'text-gray-500'}`}
                                    >Layer</button>
                                    <button 
                                        onClick={() => setActiveLayer('arrow')}
                                        disabled={!showArrow}
                                        className={`flex-1 min-w-[60px] text-xs py-2 rounded-md font-medium transition disabled:opacity-50 ${activeLayer === 'arrow' ? 'bg-white shadow text-gray-800' : 'text-gray-500'}`}
                                    >Anak Panah</button>
                                </div>

                                <div className="mb-2">
                                    {/* Butang Padam untuk bulatan aktif */}
                                    {activeLayer.startsWith('circle-') && (
                                        <button 
                                            onClick={() => handleRemoveCircle(activeLayer.replace('circle-', ''))}
                                            className="w-full flex justify-center items-center gap-2 mb-3 bg-red-50 text-red-600 hover:bg-red-100 py-1.5 rounded text-xs border border-red-200 transition"
                                        >
                                            <Trash2 size={14}/> Padam Bulatan Ini
                                        </button>
                                    )}

                                    {activeLayer !== 'arrow' && activeLayer !== 'inset' && (
                                        <>
                                            <label className="flex justify-between text-xs text-gray-500 mb-1">
                                                <span>Saiz / Skala bagi: <strong className="text-gray-700 capitalize">
                                                    {activeLayer.startsWith('circle-') ? 'bulatan aktif' : activeLayer}
                                                </strong></span>
                                            </label>
                                            
                                            {activeLayer === 'media' && (
                                                <input type="range" min="0.1" max="4" step="0.05" 
                                                    className="w-full accent-blue-600"
                                                    value={mediaProps.scale} 
                                                    onChange={(e) => setMediaProps({...mediaProps, scale: parseFloat(e.target.value)})} 
                                                />
                                            )}
                                            
                                            {activeLayer.startsWith('circle-') && (
                                                <input type="range" min="20" max="400" step="1" 
                                                    className="w-full accent-blue-600"
                                                    value={circles.find(c => c.id === activeLayer.replace('circle-', ''))?.radius || 100} 
                                                    onChange={(e) => {
                                                        const newRad = parseFloat(e.target.value);
                                                        const circleId = activeLayer.replace('circle-', '');
                                                        setCircles(circles.map(c => c.id === circleId ? { ...c, radius: newRad } : c));
                                                    }} 
                                                />
                                            )}
                                        </>
                                    )}

                                    {/* Slider Khusus Untuk Zoom Layer */}
                                    {activeLayer === 'inset' && (
                                        <div className="space-y-4 mt-2">
                                            <div>
                                                <label className="flex justify-between text-xs text-gray-500 mb-1">Saiz Layer Bulat</label>
                                                <input type="range" min="30" max="300" step="1" 
                                                    className="w-full accent-blue-600"
                                                    value={insetProps.radius} 
                                                    onChange={(e) => setInsetProps({...insetProps, radius: parseFloat(e.target.value)})} 
                                                />
                                            </div>
                                            <div className="pt-2 border-t border-gray-100">
                                                <label className="flex justify-between text-xs text-purple-700 mb-1 font-semibold">Zoom Gambar Dalam Layer</label>
                                                <input type="range" min="1" max="5" step="0.1" 
                                                    className="w-full accent-purple-600"
                                                    value={insetProps.scale || 1} 
                                                    onChange={(e) => setInsetProps({...insetProps, scale: parseFloat(e.target.value)})} 
                                                />
                                            </div>
                                            <div>
                                                <label className="flex justify-between text-xs text-indigo-600 mb-1 font-medium">Gerak Kiri / Kanan Gambar</label>
                                                <input type="range" min="-300" max="300" step="1" 
                                                    className="w-full accent-indigo-500"
                                                    value={insetProps.panX || 0} 
                                                    onChange={(e) => setInsetProps({...insetProps, panX: parseFloat(e.target.value)})} 
                                                />
                                            </div>
                                            <div>
                                                <label className="flex justify-between text-xs text-indigo-600 mb-1 font-medium">Gerak Atas / Bawah Gambar</label>
                                                <input type="range" min="-300" max="300" step="1" 
                                                    className="w-full accent-indigo-500"
                                                    value={insetProps.panY || 0} 
                                                    onChange={(e) => setInsetProps({...insetProps, panY: parseFloat(e.target.value)})} 
                                                />
                                            </div>
                                        </div>
                                    )}
                                    
                                    {activeLayer === 'arrow' && (
                                        <div className="space-y-3 mt-1">
                                            <div>
                                                <label className="flex justify-between text-xs text-gray-500 mb-1">Panjang Anak Panah</label>
                                                <input type="range" min="30" max="400" step="1" 
                                                    className="w-full accent-orange-600"
                                                    value={arrowProps.length} 
                                                    onChange={(e) => setArrowProps({...arrowProps, length: parseFloat(e.target.value)})} 
                                                />
                                            </div>
                                            <div>
                                                <label className="flex justify-between text-xs text-gray-500 mb-1">Arah Sudut (Darjah)</label>
                                                <input type="range" min="-180" max="180" step="1" 
                                                    className="w-full accent-orange-600"
                                                    value={arrowProps.angle} 
                                                    onChange={(e) => setArrowProps({...arrowProps, angle: parseFloat(e.target.value)})} 
                                                />
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* AREA KANVAS & EKSPORT (Kanan) */}
                        <div className="lg:col-span-8 flex flex-col items-center">
                            
                            <div className="w-full flex flex-wrap justify-between items-center bg-white p-3 rounded-xl shadow-sm border border-gray-100 mb-4 gap-4">
                                <div className="flex items-center gap-2">
                                    {mediaType === 'video' && (
                                        <button 
                                            onClick={togglePlay}
                                            className="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-800 px-4 py-2 rounded-lg font-medium text-sm transition"
                                        >
                                            {isPlaying ? <Pause size={16}/> : <Play size={16}/>}
                                            {isPlaying ? 'Jeda Video' : 'Main Video'}
                                        </button>
                                    )}
                                    {isRecording && (
                                        <div className="flex items-center gap-4 text-sm font-medium">
                                            <div className="flex items-center gap-2 text-red-600 animate-pulse">
                                                <div className="w-3 h-3 bg-red-600 rounded-full"></div> Sedang Merakam (720p)...
                                            </div>
                                            <div className="flex items-center gap-3 bg-gray-100 px-3 py-1 rounded-md text-gray-700">
                                                <span className="flex items-center gap-1" title="Masa (Max 60s)"><Clock size={14}/> {recordingTime}s / 60s</span>
                                                <span className="flex items-center gap-1" title="Saiz (Max 1MB)"><HardDrive size={14}/> {(recordingSize / 1024).toFixed(0)}KB / 1MB</span>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="flex gap-2">
                                    <button 
                                        onClick={downloadJPEG}
                                        className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium text-sm transition shadow-sm"
                                    >
                                        <Download size={16}/> Simpan JPEG
                                    </button>
                                    
                                    {!isRecording ? (
                                        <button 
                                            onClick={startRecording}
                                            className="flex items-center gap-2 bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-medium text-sm transition shadow-sm"
                                        >
                                            <Video size={16}/> Rakam Video MP4
                                        </button>
                                    ) : (
                                        <button 
                                            onClick={stopRecording}
                                            className="flex items-center gap-2 bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded-lg font-medium text-sm transition shadow-sm"
                                        >
                                            <Square size={16}/> Henti & Simpan
                                        </button>
                                    )}
                                </div>
                            </div>

                            <div className="relative w-full max-w-4xl bg-gray-200 rounded-lg shadow-lg overflow-hidden flex items-center justify-center border-4 border-white">
                                <canvas
                                    ref={canvasRef}
                                    width={960}
                                    height={720}
                                    className="w-full h-auto cursor-move touch-none"
                                    style={{ aspectRatio: '4/3' }}
                                    onPointerDown={handlePointerDown}
                                    onPointerMove={handlePointerMove}
                                    onPointerUp={handlePointerUp}
                                    onPointerLeave={handlePointerUp}
                                />
                            </div>
                        </div>

                        {/* RUANGAN REKOD SISTEM (Bawah) */}
                        <div className="lg:col-span-12 mt-4 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <div className="flex items-center justify-between mb-6">
                                <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                                    <Save className="text-green-600" size={20} />
                                    Senarai Rekod Eviden
                                </h2>
                                <span className="text-xs text-gray-500 bg-gray-100 px-3 py-1 rounded-full">Disimpan secara Auto semasa muat turun</span>
                            </div>

                            {records.length === 0 ? (
                                <div className="text-center py-10 text-gray-400 bg-gray-50 rounded-lg border border-dashed border-gray-200">
                                    <Info className="mx-auto mb-2 text-gray-300" size={32}/>
                                    <p>Tiada rekod eviden dijumpai. Rekod akan disimpan secara automatik apabila anda menyimpan gambar atau video.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                                    {records.map(record => (
                                        <div key={record.id} className="bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm hover:shadow transition group flex flex-col">
                                            <div className="relative h-32 bg-gray-100 border-b border-gray-200 overflow-hidden">
                                                <img src={record.thumbnail} alt="Thumbnail" className="w-full h-full object-cover" />
                                            </div>
                                            <div className="p-3 flex-1 flex flex-col">
                                                <h3 className="text-sm font-semibold text-gray-800 truncate mb-1" title={record.title}>{record.title}</h3>
                                                <p className="text-[10px] text-gray-500 mb-3 flex-1">{record.date}</p>
                                                
                                                <div className="flex gap-2 mt-auto">
                                                    <button 
                                                        onClick={() => loadRecord(record)}
                                                        className="flex-1 flex justify-center items-center gap-1 bg-blue-50 hover:bg-blue-100 text-blue-700 text-xs py-1.5 rounded transition font-medium border border-blue-100"
                                                    >
                                                        <Edit size={12}/> Edit
                                                    </button>
                                                    <button 
                                                        onClick={() => deleteRecord(record.id)}
                                                        className="flex justify-center items-center w-8 bg-red-50 hover:bg-red-100 text-red-600 text-xs py-1.5 rounded transition border border-red-100"
                                                        title="Padam Rekod"
                                                    >
                                                        <Trash2 size={12}/>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
